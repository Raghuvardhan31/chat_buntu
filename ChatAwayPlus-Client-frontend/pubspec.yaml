name: chataway_plus
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.11+24

# Updated Dart SDK and Flutter SDK constraints to match versions in pubspec.lock
environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # HTTP package for API calls
  http: ^1.4.0

  # HTTP parser for multipart requests
  http_parser: ^4.1.2

  # MIME type detection
  mime: ^2.0.0

  # Permission handler for contacts and photos
  permission_handler: ^12.0.1

  # Device info for Android SDK level detection
  device_info_plus: ^10.1.2

  # Package info for app version detection
  package_info_plus: ^9.0.0

  # Shimmer for loading animations
  shimmer: ^3.0.0

  # Riverpod for state management
  flutter_riverpod: ^2.6.1

  #  connectivity_plus: ^4.0.0
  internet_connection_checker: ^1.0.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # Socket.IO client for real-time chat
  socket_io_client: ^2.0.3+1

  # Flutter contacts for device contacts
  flutter_contacts: ^1.1.9+2

  # SQLite for local database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Connectivity monitoring
  connectivity_plus: ^6.1.4

  # Toast notifications
  fluttertoast: ^8.2.8

  # Characters package for emoji-aware string handling
  characters: ^1.3.1

  # Firebase packages for push notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^19.4.0

  # Disk-cached network images (offline support)
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.2

  # Image picker for gallery and camera access
  image_picker: ^1.2.0

  file_picker: ^8.1.2

  # Image cropper for image editing
  image_cropper: ^10.0.0+1

  # Generate thumbnails from videos (for video preview + chat bubble)
  video_thumbnail: ^0.5.3

  # Video player for video stories playback
  video_player: ^2.9.2

  # media_kit backend for video_player — uses FFmpeg software decoding
  # Fixes MediaCodecVideoRenderer crashes on older/problematic Android devices
  video_player_media_kit: ^2.0.0
  media_kit_libs_android_video: any
  media_kit_libs_ios_video: any

  # Native video trimming (no FFmpeg dependency)
  flutter_native_video_trimmer: ^1.1.9

  # Carousel slider for photo carousels
  carousel_slider: ^5.1.1

  # Path provider for accessing app directories
  path_provider: ^2.1.4

  # File system abstraction (used by PersistentFileSystem)
  file: ^7.0.1

  # Collection utilities (explicit dependency for better version control)
  collection: ^1.19.1

  # Clock utilities (explicit dependency for better version control)
  clock: ^1.1.2

  # Gal package for saving images to gallery (modern alternative)
  gal: ^2.3.0

  # SharedPreferences for caching notification messages
  shared_preferences: ^2.3.3

  # App badge management for clearing notification badges
  app_badge_plus: ^1.2.3
  intl: ^0.20.2
  emoji_picker_flutter: ^4.3.0
  image: ^4.5.4
  audioplayers: ^6.5.1
  record: 5.1.2
  url_launcher: ^6.3.2

  # Location sharing packages
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0

  # Agora RTC Engine for voice/video calling
  agora_rtc_engine: ^6.3.2

  # Open files with native apps
  open_filex: ^4.5.0
  # In-app PDF viewing
  pdfrx: ^2.2.24
  uuid: ^4.5.2

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Flutter launcher icons package for generating app icons
  flutter_launcher_icons: ^0.14.4

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Assets configuration for ChatAway+ app
  assets:
    - assets/images/align-left.png
    - assets/images/app_gate-logo.jpeg
    - assets/images/app_logo.jpeg
    - assets/images/backgrounds/chat/
    - assets/images/chat/attachments/
    - assets/images/illustrations/otp_visuals/
    - assets/imp_icons/
    - assets/express_hub_icons/
    - assets/sounds/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_logo.jpeg"
  min_sdk_android: 24
